name: Update Currency Rates

on:
  schedule:
    # Run once every 24 hours at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow running the workflow manually from the GitHub UI

jobs:
  update-rates:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit and push changes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Fetch and save rates
        env:
          EXCHANGERATE_API_KEY: ${{ secrets.EXCHANGE_RATE_API_KEY }}
        run: python update_rates.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add rates.json
          git commit -m "chore: update currency rates" || echo "No changes to commit"
          git push
